services:
  mysql:
    image: mysql:8.0
    container_name: viajesgvr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 2318
      MYSQL_DATABASE: db_viajesgvr
      TZ: America/Santiago
    volumes:
      - viajesgvr-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p2318"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: viajesgvr-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
      KC_HOSTNAME: https://18.216.240.192:8070
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      JAVA_OPTS_KC_HEAP: "-Xms128m -Xmx384m"
    command:
      - start-dev
      - --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./viajesgvr-realm.json:/opt/keycloak/data/import/viajesgvr-realm.json:ro
      - viajesgvr-keycloak-data:/opt/keycloak/data

  backend-1:
    image: gianellovr/viajesgvr-backend:latest
    container_name: viajesgvr-backend-1
    environment:
      SERVER_PORT: 8090
      DB_URL: jdbc:mysql://mysql:3306/db_viajesgvr?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 2318
      KEYCLOAK_ISSUER_URI: https://18.216.240.192:8070/realms/viajesgvr
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/viajesgvr/protocol/openid-connect/certs
      TZ: America/Santiago
      JAVA_TOOL_OPTIONS: "-Duser.timezone=America/Santiago -Xms128m -Xmx192m"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started

  backend-2:
    image: gianellovr/viajesgvr-backend:latest
    container_name: viajesgvr-backend-2
    environment:
      SERVER_PORT: 8090
      DB_URL: jdbc:mysql://mysql:3306/db_viajesgvr?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 2318
      KEYCLOAK_ISSUER_URI: https://18.216.240.192:8070/realms/viajesgvr
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/viajesgvr/protocol/openid-connect/certs
      TZ: America/Santiago
      JAVA_TOOL_OPTIONS: "-Duser.timezone=America/Santiago -Xms128m -Xmx192m"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started

  backend-3:
    image: gianellovr/viajesgvr-backend:latest
    container_name: viajesgvr-backend-3
    environment:
      SERVER_PORT: 8090
      DB_URL: jdbc:mysql://mysql:3306/db_viajesgvr?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 2318
      KEYCLOAK_ISSUER_URI: https://18.216.240.192:8070/realms/viajesgvr
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/viajesgvr/protocol/openid-connect/certs
      TZ: America/Santiago
      JAVA_TOOL_OPTIONS: "-Duser.timezone=America/Santiago -Xms128m -Xmx192m"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started

  backend-balancer:
    image: nginx:alpine
    container_name: viajesgvr-backend-balancer
    ports:
      - "8090:8090"
    volumes:
      - ./nginx-backend.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3

  frontend-1:
    image: gianellovr/viajesgvr-frontend:latest
    container_name: viajesgvr-frontend-1
    command: >
      sh -c "find /usr/share/nginx/html -type f -name '*.js' -exec sed -i
      -e 's|http://localhost:8080|https://18.216.240.192:8070|g'
      -e 's|http://localhost:8090/api|https://18.216.240.192:8070/api|g'
      {} + && nginx -g 'daemon off;'"
    depends_on:
      - backend-balancer

  frontend-2:
    image: gianellovr/viajesgvr-frontend:latest
    container_name: viajesgvr-frontend-2
    command: >
      sh -c "find /usr/share/nginx/html -type f -name '*.js' -exec sed -i
      -e 's|http://localhost:8080|https://18.216.240.192:8070|g'
      -e 's|http://localhost:8090/api|https://18.216.240.192:8070/api|g'
      {} + && nginx -g 'daemon off;'"
    depends_on:
      - backend-balancer

  frontend-3:
    image: gianellovr/viajesgvr-frontend:latest
    container_name: viajesgvr-frontend-3
    command: >
      sh -c "find /usr/share/nginx/html -type f -name '*.js' -exec sed -i
      -e 's|http://localhost:8080|https://18.216.240.192:8070|g'
      -e 's|http://localhost:8090/api|https://18.216.240.192:8070/api|g'
      {} + && nginx -g 'daemon off;'"
    depends_on:
      - backend-balancer

  frontend-balancer:
    image: nginx:alpine
    container_name: viajesgvr-frontend-balancer
    ports:
      - "8070:443"
    volumes:
      - ./nginx-frontend-aws-ssl.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend-1
      - frontend-2
      - frontend-3

volumes:
  viajesgvr-mysql-data:
  viajesgvr-keycloak-data:
