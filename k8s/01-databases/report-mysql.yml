apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-mysql
  namespace: viajesgvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-mysql
  template:
    metadata:
      labels:
        app: report-mysql
    spec:
      containers:
        - name: report-mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: viajesgvr-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: db_viajesgvr_report
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: report-mysql
  namespace: viajesgvr
spec:
  type: ClusterIP
  selector:
    app: report-mysql
  ports:
    - port: 3306
      targetPort: 3306