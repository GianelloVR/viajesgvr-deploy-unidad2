apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-status-service
  namespace: viajesgvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-status-service
  template:
    metadata:
      labels:
        app: reservation-status-service
    spec:
      containers:
        - name: reservation-status-service
          image: gianellovr/viajesgvr-reservation-status-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: viajesgvr-common-config
          env:
            - name: DB_URL
              value: "jdbc:mysql:///=true&useSSL=false&serverTimezone=UTC"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: viajesgvr-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: viajesgvr-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: reservation-status-service
  namespace: viajesgvr
spec:
  type: ClusterIP
  selector:
    app: reservation-status-service
  ports:
    - port: 8080
      targetPort: 8080