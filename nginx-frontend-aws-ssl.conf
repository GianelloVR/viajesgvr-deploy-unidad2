events {}

http {
    upstream frontend_servers {
        server frontend-1:80;
        server frontend-2:80;
        server frontend-3:80;
    }

    upstream backend_api {
        server backend-balancer:8090;
    }

    upstream keycloak_server {
        server keycloak:8080;
    }

    server {
        listen 443 ssl;

        ssl_certificate /etc/nginx/certs/viajesgvr.crt;
        ssl_certificate_key /etc/nginx/certs/viajesgvr.key;

        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8070;
        }

        location /realms/ {
            proxy_pass http://keycloak_server;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8070;
        }

        location /resources/ {
            proxy_pass http://keycloak_server;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8070;
        }

        location /admin/ {
            proxy_pass http://keycloak_server;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8070;
        }

        location / {
            proxy_pass http://frontend_servers;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8070;
        }
    }
}
